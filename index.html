<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iOS Web App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Top Navigation Bar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            padding-top: env(safe-area-inset-top);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #d1d1d6;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        header h1 {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }

        /* Main Content Container */
        main {
            padding: calc(64px + env(safe-area-inset-top)) 16px calc(64px + env(safe-area-inset-bottom)) 16px;
        }

        /* iOS Style List Group */
        .ios-list {
            background: var(--ios-card);
            border-radius: 10px;
            padding: 0;
            margin: 0 0 20px 0;
            list-style: none;
            overflow: hidden;
        }

        .ios-item {
            padding: 14px 16px;
            border-bottom: 0.5px solid #c6c6c8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .ios-item:last-child {
            border-bottom: none;
        }

        .ios-item:active {
            background-color: #e5e5ea;
        }

        /* iOS Bottom Tab Bar */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 49px;
            padding-bottom: env(safe-area-inset-bottom);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #d1d1d6;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #8e8e93;
            text-decoration: none;
            flex: 1;
        }

        .tab.active {
            color: var(--ios-blue);
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="nav-title">Home</h1>
    </header>

    <main>
        <ul class="ios-list">
            <li class="ios-item" onclick="showAlert('Profile Clicked')">
                <span>Account Profile</span>
                <span style="color: #c4c4c6;">&rsaquo;</span>
            </li>
            <li class="ios-item" onclick="showAlert('Settings Clicked')">
                <span>System Settings</span>
                <span style="color: #c4c4c6;">&rsaquo;</span>
            </li>
            <li class="ios-item" onclick="showAlert('Notifications Clicked')">
                <span>Notifications</span>
                <span style="color: #c4c4c6;">&rsaquo;</span>
            </li>
        </ul>
    </main>

    <nav>
        <a href="#" class="tab active" onclick="switchTab(this, 'Home')">
            <span class="tab-icon">  </span>
            <span>Home</span>
        </a>
        <a href="#" class="tab" onclick="switchTab(this, 'Search')">
            <span class="tab-icon">  </span>
            <span>Search</span>
        </a>
        <a href="#" class="tab" onclick="switchTab(this, 'Settings')">
            <span class="tab-icon">  </span>
            <span>Settings</span>
        </a>
    </nav>

    <script>
        function switchTab(element, title) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('nav-title').innerText = title;
        }

        function showAlert(message) {
            alert(message);
        }

        // Service worker registration for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
